{{- if and (eq .Values.authMode "cloud") (not .Values.clerk.existingSecretName) -}}
{{- $publishableKey := required "clerk.publishableKey is required in cloud mode when clerk.existingSecretName is not set" .Values.clerk.publishableKey -}}
{{- $secretKey := required "clerk.secretKey is required in cloud mode when clerk.existingSecretName is not set" .Values.clerk.secretKey -}}
apiVersion: v1
kind: Secret
metadata:
  name: byteorder-clerk
type: Opaque
stringData:
  publishable-key: {{ $publishableKey | quote }}
  secret-key: {{ $secretKey | quote }}
{{- end }}
