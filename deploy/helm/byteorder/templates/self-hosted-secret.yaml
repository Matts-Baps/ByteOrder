{{- if and (eq .Values.authMode "self-hosted") (not .Values.selfHosted.existingSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: byteorder-self-hosted
type: Opaque
stringData:
  admin-username: {{ .Values.selfHosted.adminUsername | quote }}
  admin-password: {{ required "selfHosted.adminPassword is required in self-hosted mode" .Values.selfHosted.adminPassword | quote }}
  jwt-secret: {{ required "selfHosted.jwtSecret is required in self-hosted mode" .Values.selfHosted.jwtSecret | quote }}
{{- end }}
